        button { background: #00aaff; color: black; border: none; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: background 0.2s, transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; transform: none; }
        
        .btn-green { background: #28a745; color: white; }
        #status { color: #ffaa00; font-size: 12px; font-weight: bold; max-width: 250px; text-align: right; }
