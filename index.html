<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Target - 3s Temporal Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #121212; color: white; margin: 0; display: flex; height: 100dvh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; z-index: 100; }
        .section-title { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .target-list, .scan-list { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .scan-list { border-top: 2px dashed #333; padding-top: 10px; }
        
        .list-btn { background: #2a2a2a; color: white; border: 1px solid #444; padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .list-btn.active { background: #0056b3; border-color: #00aaff; }
        .list-btn:hover { background: #333; }
        
        .scan-item { background: #222; border: 1px solid #444; border-left: 3px solid #00aaff; padding: 8px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        
        .delete-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 5px; background: rgba(255, 68, 68, 0.1); border-radius: 4px; font-size: 12px; }
        
        .main { flex: 1; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; z-index: 100; }
        
        .viewer { flex: 1; position: relative; background: #000; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #displayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; z-index: 10; }
        
        button { background: #00aaff; color: black; border: none; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        button:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; }
        .btn-green { background: #28a745; color: white; }
        
        #status { color: #ffaa00; font-size: 14px; font-weight: bold; text-align: right; }
        
        /* Debug Console to catch silent errors */
        #debugLog { position: absolute; bottom: 0; left: 0; width: 100%; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.8); color: #ff4444; font-family: monospace; font-size: 12px; z-index: 9999; padding: 10px; display: none; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 class="section-title">🎯 Target Directories</h2>
        <button onclick="createNewTarget()" style="margin-bottom: 10px; padding: 8px;">➕ New Target</button>
        <div class="target-list" id="targetList"></div>
        
        <h2 class="section-title" id="scanTitle">📂 Scan History</h2>
        <div class="scan-list" id="scanList"></div>

        <button id="btnCam" onclick="startCamera()" style="margin-top: auto; background: #ffaa00;">📸 Start Camera</button>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h2 id="currentTargetName" style="margin: 0; font-size: 20px;">Loading...</h2>
                <span id="status">Waiting for System...</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="btnSwitchCam" onclick="switchCamera()" style="display:none; background: #6c757d; color: white;">🔄 Switch Lens</button>
                <button id="btnBaseline" onclick="setBaseline()" disabled>📸 Set Baseline</button>
                <button id="btnNewShot" class="btn-green" onclick="startFullScan()" disabled>🔴 Scan (3s)</button>
            </div>
        </div>

        <div class="viewer">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="displayCanvas"></canvas>
            <canvas id="calcCanvas" style="display:none;"></canvas>
        </div>
    </div>

    <div id="debugLog"></div>

<script>
    // 1. BULLETPROOF ERROR CATCHER
    function logError(msg) {
        let debugDiv = document.getElementById('debugLog');
        debugDiv.style.display = 'block';
        debugDiv.innerHTML += `<div>[ERR] ${msg}</div>`;
        document.getElementById('status').innerText = "SYSTEM ERROR";
        document.getElementById('status').style.color = "#ff4444";
    }
    
    window.onerror = function(message, source, lineno, colno, error) {
        logError(`${message} at line ${lineno}`);
        return true; 
    };
    window.addEventListener('unhandledrejection', function(event) {
        logError(`Promise rejected: ${event.reason}`);
    });

    // 2. STATE VARIABLES
    let cvReady = false;
    let stream = null;
    let targets = []; 
    let activeTargetId = null;
    
    let procW = 640, procH = 480;
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let cropSize = 0, targetRadius = 0, targetCenter = { x: 0, y: 0 };
    
    const PROXIMITY = 15.0;
    const REQ_FRAMES = 5; 
    let candidates = [];
    let isScanning = false;
    let scanStartTime = 0;

    let videoDevices = [];
    let currentDeviceIndex = 0;

    // 3. OPENCV INITIALIZATION HOOK
    var Module = { 
        onRuntimeInitialized: function() { 
            setTimeout(initApp, 500); // Give DOM half a second to settle
        } 
    };

    // 4. MAIN APP LOGIC
    async function initApp() {
        try {
            document.getElementById('status').innerText = "Loading Saved Data...";
            document.getElementById('status').style.color = "#ffaa00";

            orb = new cv.ORB(1500);
            matcher = new cv.BFMatcher(cv.NORM_HAMMING, true);
            refKP = new cv.KeyPointVector();
            refDesc = new cv.Mat();
            cvReady = true;
            
            const savedData = await localforage.getItem('smart_targets_db');
            if (savedData && Array.isArray(savedData) && savedData.length > 0) {
                targets = savedData;
                setActiveTarget(targets[0].id);
            } else {
                createNewTarget("Session 1");
            }
            document.getElementById('status').innerText = "System Ready. Start Camera.";
            document.getElementById('status').style.color = "#00ff00";
        } catch(e) {
            logError("Init Error: " + e.message);
        }
    }

    function saveToPhone() {
        localforage.setItem('smart_targets_db', targets).catch(e => logError("Save Failed: " + e.message));
    }

    function createNewTarget(name = null) {
        if (!name) name = prompt("Enter Target Name:", "New Target");
        if (!name) return;
        const newTarget = { id: Date.now().toString(), name: name, scans: [] };
        targets.push(newTarget);
        saveToPhone();
        setActiveTarget(newTarget.id);
    }

    function deleteTarget(id) {
        if(confirm("Delete this entire target directory?")) {
            targets = targets.filter(t => t.id !== id);
            saveToPhone();
            if(activeTargetId === id) setActiveTarget(targets.length > 0 ? targets[0].id : null);
            else renderTargetList();
        }
    }

    function setActiveTarget(id) {
        activeTargetId = id;
        renderTargetList();
        const target = targets.find(t => t.id === id);
        if (target) {
            document.getElementById('currentTargetName').innerText = target.name;
            renderScansList();
            drawTargetState(target);
            
            if(refGray) { refGray.delete(); refGray = null; }
            document.getElementById('btnNewShot').disabled = true;
        }
    }

    function renderTargetList() {
        const list = document.getElementById('targetList');
        list.innerHTML = "";
        targets.forEach(t => {
            const isActive = t.id === activeTargetId ? 'active' : '';
            list.innerHTML += `<div class="list-btn ${isActive}" onclick="setActiveTarget('${t.id}')"><span>📁 ${t.name}</span><span class="delete-btn" onclick="event.stopPropagation(); deleteTarget('${t.id}')">✖</span></div>`;
        });
    }

    function renderScansList() {
        const list = document.getElementById('scanList');
        const target = targets.find(t => t.id === activeTargetId);
        list.innerHTML = "";
        if (!target || !target.scans || target.scans.length === 0) {
            list.innerHTML = "<div style='color:#666; font-size:12px; text-align:center;'>No scans logged yet.</div>";
            return;
        }
        [...target.scans].reverse().forEach((scan, index) => {
            list.innerHTML += `<div class="scan-item"><span>⏱️ ${scan.name} <span style="color:#888;">(${scan.holes.length} shots)</span></span><span class="delete-btn" onclick="deleteScan('${scan.id}')">Delete</span></div>`;
        });
    }

    function deleteScan(scanId) {
        const target = targets.find(t => t.id === activeTargetId);
        if (!target) return;
        if (confirm("Delete this scan and its holes?")) {
            target.scans = target.scans.filter(s => s.id !== scanId);
            target.scans.forEach((s, i) => s.name = `Scan ${i + 1}`);
            saveToPhone();
            renderScansList();
            drawTargetState(target);
        }
    }

    // --- CAMERA ENGINE (FIXED) ---
    async function startCamera(deviceId = null) {
        document.getElementById('status').innerText = "Requesting Camera...";
        
        try {
            // First time getting cameras, ask for general environment cam to unlock permissions
            if (!deviceId && videoDevices.length === 0) {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                let devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
            } else {
                // If a specific device is selected, DO NOT pass facingMode, it crashes phones.
                let constraints = { video: { deviceId: { exact: deviceId } } };
                if (stream) { stream.getTracks().forEach(t => t.stop()); }
                stream = await navigator.mediaDevices.getUserMedia(constraints);
            }

            if (videoDevices.length > 1) {
                document.getElementById('btnSwitchCam').style.display = 'block';
            }

            const videoEl = document.getElementById('webcam');
            videoEl.srcObject = stream; 
            
            videoEl.onloadedmetadata = () => {
                let scale = Math.min(640 / videoEl.videoWidth, 640 / videoEl.videoHeight); 
                procW = Math.round(videoEl.videoWidth * scale);
                procH = Math.round(videoEl.videoHeight * scale);
                
                document.getElementById('displayCanvas').width = procW;
                document.getElementById('displayCanvas').height = procH;
                document.getElementById('calcCanvas').width = procW;
                document.getElementById('calcCanvas').height = procH;
                
                videoEl.play();
                document.getElementById('btnBaseline').disabled = false; 
                document.getElementById('btnCam').style.display = 'none';
                document.getElementById('status').innerText = "Center Target & Lock"; 
                document.getElementById('status').style.color = "#00aaff";
            };
        } catch(err) {
            logError("Camera Blocked: " + err.message);
        }
    }

    function switchCamera() {
        if (isScanning || videoDevices.length <= 1) return;
        currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
        
        if(refGray) { refGray.delete(); refGray = null; }
        document.getElementById('btnNewShot').disabled = true;
        
        startCamera(videoDevices[currentDeviceIndex].deviceId);
    }

    // --- OPENCV PROCESSING ENGINE ---
    function grab() {
        let cvs = document.getElementById('calcCanvas');
        let video = document.getElementById('webcam');
        cvs.getContext('2d').drawImage(video, 0, 0, procW, procH); 
        return cv.imread(cvs);
    }

    function setBaseline() {
        if (!activeTargetId || !stream) return;
        
        try {
            let frame = grab();
            let gray = new cv.Mat(), thresh = new cv.Mat();
            cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY); 
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
            
            let contours = new cv.MatVector(), hierarchy = new cv.Mat(); 
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            
            let best = null, maxA = 0;
            for(let i=0; i<contours.size(); i++) {
                let a = cv.contourArea(contours.get(i));
                if(a > 2000 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
            }
            
            if(!best) { 
                alert("Target ring not detected. Move closer/further.");
                frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); 
                return; 
            }

            targetRadius = Math.round(best.radius);
            cropSize = targetRadius * 2 + 60;
            let rx = Math.max(0, best.center.x - cropSize/2), ry = Math.max(0, best.center.y - cropSize/2);
            targetCenter = { x: best.center.x - rx, y: best.center.y - ry };
            
            let roi = frame.roi(new cv.Rect(rx, ry, Math.min(frame.cols-rx, cropSize), Math.min(frame.rows-ry, cropSize)));
            
            if(refGray) refGray.delete();
            refGray = new cv.Mat(); 
            cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
            
            let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
            cv.circle(mask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 10, new cv.Scalar(255), -1);
            
            orb.detectAndCompute(refGray, mask, refKP, refDesc);
            
            document.getElementById('btnNewShot').disabled = false;
            document.getElementById('status').innerText = "Baseline Locked!"; 
            document.getElementById('status').style.color = "#ff3b30";
            
            frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
        } catch (e) {
            logError("Baseline Error: " + e.message);
        }
    }

    function startFullScan() {
        if (!refGray) return;
        
        let btn = document.getElementById('btnNewShot');
        btn.innerText = "SETTLING...";
        btn.style.background = "#ffaa00"; 
        btn.disabled = true;
        document.getElementById('btnBaseline').disabled = true;
        
        setTimeout(() => {
            btn.innerText = "SCANNING (3s)...";
            btn.style.background = "#ff3b30"; 
            candidates = []; 
            isScanning = true;
            scanStartTime = performance.now();
            scanLoop();
        }, 1000);
    }

    function scanLoop() {
        if (!isScanning) return;
        if (performance.now() - scanStartTime > 3000) {
            endScan();
            return;
        }

        try { processFrame(); } catch (e) { logError("Scan error: " + e.message); isScanning = false; return; }
        
        candidates.forEach(c => { c.f -= 0.05; });
        candidates = candidates.filter(c => c.f > 0);
        requestAnimationFrame(scanLoop);
    }

    function processFrame() {
        let frame = grab();
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        
        cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
        orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);
        
        if(!liveDesc.empty()) {
            matcher.match(refDesc, liveDesc, matches);
            let good = [];
            for(let i=0; i<matches.size(); i++) { 
                if(matches.get(i).distance < 48) good.push(matches.get(i));
            }
            
            if(good.length > 10) {
                let srcP = [], dstP = [];
                for(let m of good) { 
                    srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); 
                    dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); 
                }
                
                let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP);
                let matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);
                
                if(!H.empty()) {
                    let invH = new cv.Mat();
                    cv.invert(H, invH, cv.DECOMP_LU);
                    
                    let warped = new cv.Mat(); 
                    cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                    
                    let diff = new cv.Mat(), thresh = new cv.Mat();
                    cv.absdiff(refGray, warped, diff); 
                    cv.threshold(diff, thresh, 50, 255, cv.THRESH_BINARY);
                    
                    let liveMask = cv.Mat.zeros(refGray.rows, refGray.cols, cv.CV_8UC1);
                    cv.circle(liveMask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 15, new cv.Scalar(255), -1);
                    
                    let maskedThresh = new cv.Mat(); 
                    thresh.copyTo(maskedThresh, liveMask);

                    let contours = new cv.MatVector(), hier = new cv.Mat();
                    cv.findContours(maskedThresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                    
                    for(let i=0; i<contours.size(); i++) {
                        let cnt = contours.get(i), area = cv.contourArea(cnt);
                        if(area > 15 && area < 600) {
                            let M = cv.moments(cnt);
                            let p = {x: M.m10/M.m00, y: M.m01/M.m00};
                            if (Math.hypot(p.x - targetCenter.x, p.y - targetCenter.y) > targetRadius - 15) continue;
                            
                            let hull = new cv.Mat(); 
                            cv.convexHull(cnt, hull);
                            let solidity = area / (cv.contourArea(hull) || 1); 
                            hull.delete();
                            
                            if(solidity > 0.80) {
                                let pFull = cv.matFromArray(3, 1, cv.CV_64F, [p.x, p.y, 1.0]);
                                let dP = new cv.Mat();
                                cv.gemm(H, pFull, 1, new cv.Mat(), 0, dP);
                                let finalX = dP.data64F[0]/dP.data64F[2];
                                let finalY = dP.data64F[1]/dP.data64F[2];
                                
                                let c = candidates.find(can => Math.hypot(can.x - finalX, can.y - finalY) < PROXIMITY);
                                if (c) { c.f++; } else { candidates.push({x: finalX, y: finalY, f: 1}); }
                                
                                pFull.delete(); dP.delete();
                            }
                        }
                    }
                    invH.delete(); warped.delete(); diff.delete(); thresh.delete(); liveMask.delete(); maskedThresh.delete(); contours.delete(); hier.delete();
                }
                matSrc.delete(); matDst.delete(); H.delete();
            }
        }
        frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
    }

    function endScan() {
        isScanning = false;
        const target = targets.find(t => t.id === activeTargetId);
        
        let knownHoles = target.scans.flatMap(s => s.holes);
        let confirmedHoles = candidates.filter(c => c.f >= REQ_FRAMES);
        let newValidHoles = [];

        for(let h of confirmedHoles) {
            let isOld = knownHoles.some(old => Math.hypot(old.x - h.x, old.y - h.y) < PROXIMITY);
            if(!isOld) { newValidHoles.push({x: h.x, y: h.y}); }
        }

        if (newValidHoles.length > 0) {
            target.scans.push({ id: Date.now().toString(), name: `Scan ${target.scans.length + 1}`, holes: newValidHoles });
            saveToPhone();
            renderScansList();
        }

        drawTargetState(target);

        let btn = document.getElementById('btnNewShot');
        btn.innerText = "🔴 Scan (3s)";
        btn.style.background = ""; 
        btn.classList.add("btn-green");
        btn.disabled = false;
        document.getElementById('btnBaseline').disabled = false;
        
        document.getElementById('status').innerText = `Done. ${newValidHoles.length} New Shots.`;
        document.getElementById('status').style.color = "#00ff00";
    }

    function drawTargetState(target) {
        let cvs = document.getElementById('displayCanvas');
        let ctx = cvs.getContext('2d');
        ctx.clearRect(0, 0, procW, procH);
        
        if (!target || !target.scans) return;
        let totalScans = target.scans.length;

        target.scans.forEach((scan, index) => {
            let isLastScan = (index === totalScans - 1);
            scan.holes.forEach(h => {
                ctx.beginPath();
                ctx.arc(h.x, h.y, 8, 0, 6.28); 
                ctx.lineWidth = 3;
                if (isLastScan) {
                    ctx.strokeStyle="rgba(0,255,0,0.9)"; 
                    ctx.stroke();
                    ctx.moveTo(h.x - 12, h.y); ctx.lineTo(h.x + 12, h.y);
                    ctx.moveTo(h.x, h.y - 12); ctx.lineTo(h.x, h.y + 12);
                    ctx.stroke();
                } else {
                    ctx.strokeStyle="rgba(255,0,0,0.8)"; 
                    ctx.stroke();
                }
            });
        });
    }
</script>

<script async src="https://docs.opencv.org/4.8.0/opencv.js" onerror="logError('Failed to download OpenCV script from CDN.');"></script>

</body>
</html>
